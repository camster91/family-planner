name: Build, Test & Deploy to Coolify

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://placeholder/placeholder

      - name: Build
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: 'true'
          NODE_ENV: production

      - name: Run tests
        run: npm test -- --ci
        env:
          CI: true

      # Use Coolify's async /applications/{uuid}/start endpoint — it queues the
      # deployment and returns 200 immediately. The previous /api/v1/deploy endpoint
      # runs the deploy synchronously, which timed out in CI.
      - name: Trigger Coolify Deployment
        run: |
          echo "Triggering Coolify deployment for $COOLIFY_APP_UUID"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST \
            -H "Authorization: Bearer *** HTTP_CODE >= 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "Deployment queued! (HTTP $HTTP_CODE)"
          else
            echo "Warning: deploy endpoint returned $HTTP_CODE"
            # Don't fail the job — build+test passed and a manual deploy is still possible.
          fi
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
