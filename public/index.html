<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Family Planner</title>
  <style>
    body { margin: 0; background: #f3f4f6; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: system-ui, sans-serif; }
    .loader { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6b7280; margin: 0; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading Family Planner...</p>
  </div>
  <script>
    window.location.href = 'https://family.ashbi.ca';
  </script>
</body>
</html>
